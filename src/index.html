<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">

  <title>Domain Generator</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light p-5">

  <div class="container bg-white p-4 rounded shadow-sm">
    <h2 class="mb-4 text-center">Domain Manager</h2>

    <div class="row g-3">
      <div class="col-md-4">
        <div class="input-group mb-3">
          <input type="text" id="input1" class="form-control" placeholder="Pronoun">
          <button class="btn btn-success" type="button" onclick="addItem('input1', 'list1')">Add</button>
        </div>
        <div id="list1" class="list-container"></div>
      </div>

      <div class="col-md-4">
        <div class="input-group mb-3">
          <input type="text" id="input2" class="form-control" placeholder="Adjective">
          <button class="btn btn-success" type="button" onclick="addItem('input2', 'list2')">Add</button>
        </div>
        <div id="list2" class="list-container"></div>
      </div>

      <div class="col-md-4">
        <div class="input-group mb-3">
          <input type="text" id="input3" class="form-control" placeholder="Extension">
          <button class="btn btn-success" type="button" onclick="addItem('input3', 'list3')">Add</button>
        </div>
        <div id="list3" class="list-container"></div>
      </div>
    </div>
  </div>

  <div class="row mt-5">
    <div class="col-12 border-top pt-4">
      <h4 class="text-center mb-4">Combinations:</h4>
      <div id="final-list" class="text-center bg-white p-3 rounded border shadow-sm" style="min-height: 100px;">
        <p class="text-muted">Add words on all columns to generate domains:</p>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>

</body>

</html>
